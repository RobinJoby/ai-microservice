name: Build and Push to Docker Hub

# 1. When should this robot run? 
# Answer: Every time you push code to the "main" branch.
on:
  push:
    branches:
      - main

# 2. What should the robot do?
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your code from GitHub onto the robot's server
      - name: Check out code
        uses: actions/checkout@v3

      # Step B: Log into Docker Hub using your saved secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step C: Build the Docker image and push it to the internet!
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: robinjoby/ai-microservice:latest